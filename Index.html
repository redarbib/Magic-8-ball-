<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Online Magic 8-Ball+</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main class="app">
            <header class="hero">
                <p class="eyebrow">Online Magic 8-Ball+</p>
                <h1>Ask anything. Get a bold answer.</h1>
                <p class="sub">Pick a vibe, ask a question, and let fate decide.</p>
            </header>

            <section class="card">
                <form id="questionForm" class="form">
                    <label class="label" for="questionInput">Your question</label>
                    <div class="input-row">
                        <input
                            id="questionInput"
                            name="question"
                            type="text"
                            placeholder="Will I ace my next exam?"
                            autocomplete="off"
                            maxlength="160"
                            required
                        />
                        <button class="btn" type="submit">Ask</button>
                    </div>

                    <div class="modes" role="radiogroup" aria-label="Answer mode">
                        <button
                            class="mode active"
                            type="button"
                            data-mode="funny"
                            role="radio"
                            aria-checked="true"
                        >
                            Funny
                        </button>
                        <button
                            class="mode"
                            type="button"
                            data-mode="random"
                            role="radio"
                            aria-checked="false"
                        >
                            Random
                        </button>
                        <button
                            class="mode"
                            type="button"
                            data-mode="serious"
                            role="radio"
                            aria-checked="false"
                        >
                            Serious
                        </button>
                        <button
                            class="mode"
                            type="button"
                            data-mode="savage"
                            role="radio"
                            aria-checked="false"
                        >
                            Savage
                        </button>
                    </div>

                    <label class="toggle">
                        <input id="saveHistory" type="checkbox" checked />
                        <span>Save my questions locally</span>
                    </label>
                    <label class="toggle">
                        <input id="enableMotion" type="checkbox" checked />
                        <span>Enable answer animations</span>
                    </label>
                </form>

                <div class="answer" id="answerBox" aria-live="polite">
                    <p class="answer-question" id="answerQuestion"></p>
                    <p class="answer-text" id="answerText">
                        Ask a question to reveal your answer.
                    </p>
                    <div class="confidence" id="confidenceWrap" hidden>
                        <span class="confidence-label">Confidence</span>
                        <span class="confidence-value" id="confidenceValue">0%</span>
                        <button class="info" id="confidenceInfo" type="button" title="Based on question length and punctuation.">?</button>
                    </div>
                </div>
            </section>

            <section class="insights">
                <div class="insights-header">
                    <h2>Insights</h2>
                </div>
                <div class="insights-grid">
                    <div class="stat">
                        <span class="stat-label">Total questions</span>
                        <span class="stat-value" id="statTotal">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Yes streak</span>
                        <span class="stat-value" id="statYesStreak">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">No streak</span>
                        <span class="stat-value" id="statNoStreak">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Last mode</span>
                        <span class="stat-value" id="statLastMode">-</span>
                    </div>
                </div>
                <div class="last3">
                    <h3>Last 3 answers</h3>
                    <ul id="last3List" class="last3-list"></ul>
                </div>
            </section>

            <section class="history">
                <div class="history-header">
                    <h2>Recent questions</h2>
                    <div class="history-actions">
                        <input id="historySearch" type="search" placeholder="Search history" aria-label="Search history" />
                        <button id="exportHistory" class="link" type="button">Export</button>
                        <button id="clearHistory" class="link" type="button">Clear</button>
                    </div>
                </div>
                <ul id="historyList" class="history-list"></ul>
            </section>
        </main>

        <script src="app.js"></script>
    </body>
</html>
